<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Knowledge Base - Cheat Sheets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #00d4ff;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .subtitle {
            text-align: center;
            margin-bottom: 40px;
            color: #a0a0a0;
            font-size: 1.1em;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            overflow: hidden;
        }
        
        thead {
            background: linear-gradient(135deg, #4169E1 0%, #1a3a52 100%);
        }
        
        th {
            padding: 18px;
            text-align: left;
            font-weight: 600;
            font-size: 1.1em;
            border-bottom: 3px solid #228B22;
        }
        
        tbody tr {
            background-color: #0f3460;
            border-bottom: 1px solid #228B22;
            transition: all 0.3s ease;
        }
        
        tbody tr:hover {
            background-color: #1a5f3f;
            box-shadow: inset 0 0 10px rgba(34, 139, 34, 0.3);
        }
        
        td {
            padding: 18px;
            vertical-align: middle;
        }
        
        td:first-child {
            color: #00d4ff;
            font-weight: 600;
            width: 30%;
        }
        
        td:nth-child(2) {
            width: 50%;
            color: #e0e0e0;
        }
        
        a {
            color: #00d4ff;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            background-color: rgba(0, 212, 255, 0.1);
            transition: all 0.3s ease;
            display: inline-block;
            font-weight: 500;
        }
        
        a:hover {
            background-color: #228B22;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
        }
        
        .status {
            padding: 6px 12px;
            border-radius: 4px;
            text-align: center;
            font-size: 0.9em;
            font-weight: 600;
        }
        
        .status.active {
            background-color: #228B22;
            color: #ffffff;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 DevOps Knowledge Base</h1>
        <p class="subtitle">Quick Access to Cheat Sheets & References</p>
        
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Link</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>NRQL Reference</td>
                    <td>Magento Ecommerce Monitoring</td>
                    <td><a href="https://ktpl00.github.io/devops-kb/nrql-reference.html" target="_blank">Open →</a></td>
                </tr>
                <tr>
                    <td>Linux Server Troubleshooting</td>
                    <td>Linux server commands, troubleshooting, and installation guide</td>
                    <td><a href="https://ktpl00.github.io/devops-kb/linux-troubleshooting.html" target="_blank">Open →</a></td>
                </tr>
            </tbody>
        </table>
        
        <div class="footer">
            <p>DevOps Knowledge Base | Last Updated: March 2026</p>
        </div>
    </div>
</body>
</html>
